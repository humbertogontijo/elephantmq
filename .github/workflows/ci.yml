name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Verify package types
        run: npx -y @arethetypeswrong/cli@latest --pack . --ignore-rules unexpected-module-syntax internal-resolution-error no-resolution

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['14', '15', '16', '17']
        node: ['20', '22']
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elephantmq_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ELEPHANTMQ_TEST_PG_URL: postgres://postgres:postgres@localhost:55432/elephantmq_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run migrate:test
      - run: npm run sql-smoketest
      - run: npx vitest run --no-file-parallelism --testTimeout 20000 --hookTimeout 20000

  coverage:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elephantmq_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ELEPHANTMQ_TEST_PG_URL: postgres://postgres:postgres@localhost:55432/elephantmq_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run migrate:test
      - run: npx vitest run --no-file-parallelism --coverage --testTimeout 60000 --hookTimeout 60000
      - run: test -s coverage/lcov.info
