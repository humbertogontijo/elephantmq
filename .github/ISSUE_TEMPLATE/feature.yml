name: Feature request
description: Suggest an addition or change to the API or behaviour.
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Please open an issue *before* sending a PR
        so we can agree on shape and scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case in concrete terms — what are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API / behaviour change would solve it? Sketch types or code samples if helpful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or rejected, and why.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false
