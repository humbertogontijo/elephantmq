services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elephantmq_test
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=200
